<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Registration Page</h1>
    <div class="Register-Container">
        <form action="">
            <label for="">Name:</label>
            <input type="text" placeholder="Enter name" id="name"><br><br>
            <label for="">Email:</label>
            <input type="email" placeholder="Enter Email" id="email"><br><br>
            <label for="">Password:</label>
            <input type="password" placeholder="Enter Password" id="pass"><br><br>
            <label for="">ReEnter password:</label>
            <input type="password" placeholder="ReEnter Password" id="repass">
            <p>Already have an account?<a href="/Frontend/login.html">Login</a></p>
            <button id="Reg-Button">Register</button>
        </form>
    </div>   
    <script src="Register.js"></script> 
</body>
</html>
